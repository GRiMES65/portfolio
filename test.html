<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #projects {
            display: flex;
            justify-content: space-around;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .cardWrapper {
            position: relative;
            margin: 10px;
            width: 200px;
        }
        .projectsCard {
            border: 2px solid black;
            border-radius: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow: hidden;
            transition: filter 0.3s;
        }
        .projectsCard img {
            max-width: 100%;
            max-height: 100%;
            transition: transform 0.3s;
        }
        .cardContent {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
            border-radius: 1rem;
        }
        .project:hover .projectsCard {
            filter: blur(5px);
        }
        .project:hover .cardContent {
            opacity: 1;
        }
    </style>
</head>
<body>
    <section id="projects">
        <div class="project">    
            <div class="projectsCard">
                <img src="/images/calculator.jpg" alt="">
                <div class="cardContent">
                    <h2>Calculator</h2>
                    <p>A simple calculator app built using Python</p>
                    <button class="projectBtn">Coming Soon..</button>
                </div>
            </div>
        </div>
        <div class="project">
            <div class="projectsCard">
                <img src="/images/ping pong.jpg" alt="">
                <div class="cardContent">
                    <h2>Ping Pong</h2>
                    <p>Simple ping pong game built using Python</p>
                    <button class="projectBtn">Coming Soon..</button>
                </div>
            </div>
        </div>
        <div class="project">    
            <div class="projectsCard">
                <img src="/images/shopping website.jpg" alt="">
                <div class="cardContent">
                    <h2>Shopping Website</h2>
                    <p>Shopping website created using HTML, CSS, and JS</p>
                    <button class="projectBtn">Coming Soon..</button>
                </div>
            </div>
        </div>
        <div class="project">
            <div class="projectsCard">
                <img src="/images/tictactoe.jpg" alt="">
                <div class="cardContent">
                    <h2>Tic Tac Toe</h2>
                    <p>A simple game of tic tac toe built using Python</p>
                    <button class="projectBtn">Coming Soon..</button>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
